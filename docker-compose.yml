version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: commercecore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: commercecore_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - commercecore-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d commercecore_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: commercecore-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=commercecore_db;Username=postgres;Password=postgres"
      Jwt__Key: "CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARACTERS_LONG"
      Jwt__Issuer: "CommerceCore"
      Jwt__Audience: "CommerceCoreClient"
    ports:
      - "8080:8080"

volumes:
  commercecore-postgres-data:
